<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>عيد ميلاد سعيد يا سموحتي ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

  .balloon{
  position: fixed;
  bottom: -100px;
  width: 40px;
  height: 55px;
  border-radius: 50%;
  opacity: .9;
  animation: rise 10s linear infinite;
}

@keyframes rise{
  0%{ transform: translateY(0) scale(1); }
  100%{ transform: translateY(-120vh) scale(1.1); }
}
body{
background: linear-gradient(135deg,#000000,#1a001f);
color:white;
font-family:Tajawal, sans-serif;
text-align:center;
padding:20px;
overflow-x:hidden;
}


button{
padding:15px 30px;
border:none;
border-radius:12px;
background:#ff4fd8;
color:white;
font-size:18px;
cursor:pointer;
}

.box{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:15px;
width:320px;
margin:auto;
margin-top:120px;
}

input{
padding:10px;
border-radius:10px;
border:none;
width:200px;
}

.hidden{
display:none;
}

/* قلوب */

.heart{
position:fixed;
color:#ff4fd8;
font-size:20px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
} 
  
/* الصور */

.slideshow{
  width: 280px;
  margin: 30px auto;
  position: relative;
  height: 420px; /* نفس ارتفاع الصورة تقريبًا */
}

.slideshow img{
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 20px;
  opacity: 0;
  transition: opacity 1.2s ease, transform 3s ease;
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(255,0,150,0.5);
}

.slideshow img.active{
  opacity: 1;
  transform: scale(1);
}

/* الرسالة */

.message{
max-width:600px;
margin:auto;
line-height:2;
font-size:18px;
margin-top:30px;
}

/* الكيكة */

.cake{
font-size:80px;
margin-top:40px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

</style>
</head>

<body>

<div id="start">

<h1>🎁 عندي مفاجأة ليكي 🎁</h1>

<button onclick="startSite()">ابدئي</button>

</div>


<div class="box hidden" id="login">

<p>اكتبي التاريخ المميز بيننا ❤️</p>

<input type="text" id="pass" placeholder="اكتبي التاريخ المميز بيننا">
<br><br>

<button onclick="check()">فتح</button>

</div>


<div id="content" class="hidden">

<h1>🎉 عيد ميلاد سعيد يا سموحتيي 🎉</h1>

<audio id="music">
  <source src="song.mp3" type="audio/mpeg">
</audio>

<h2>اجمل ذكرياتنا مع بعض 📸</h2>

<div class="slideshow">

<img src="1.jpg">
<img src="2.jpg">
<img src="3.jpg">
<img src="4.jpg">
<img src="5.jpg">

</div>

<div class="message" id="message"></div>

<div class="cake">🎂</div>

</div>

<script>

  function fireWorks(){

  setInterval(()=>{

    confetti({
      particleCount: 120,
      spread: 100,
      origin:{ y:0.6 }
    });

  },2000);

}
  
  function startBalloons(){

  setInterval(()=>{

    let b = document.createElement("div");
    b.className = "balloon";

    b.style.left = Math.random()*100 + "%";
    b.style.background = "hsl(" + Math.random()*360 + ",70%,60%)";

    document.body.appendChild(b);

    setTimeout(()=> b.remove(), 10000);

  },300);

}
  
function startSite(){

document.getElementById("start").style.display="none";
document.getElementById("login").classList.remove("hidden");

}startBalloons();
fireWorks();
document.getElementById("music").play();
  

function check(){

var password="4/1/2025";
var input=document.getElementById("pass").value;

if(input==password){

document.getElementById("login").style.display="none";
document.getElementById("content").classList.remove("hidden");
document.getElementById("music").play();
  

startConfetti();
startHearts();
startSlideshow();
typeMessage();
startBalloons();
fireWorks();

}else{

alert("التاريخ غلط ❤️ عيب عليكي");

}

}

/* احتفال */

function startConfetti(){

confetti({
particleCount:300,
spread:120
});

}

/* قلوب */

function startHearts(){

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

heart.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),8000);

},600);

}

/* سلايد شو */

function startSlideshow(){

let slides=document.querySelectorAll(".slideshow img");
let index=0;

slides[index].classList.add("active");

setInterval(()=>{

slides[index].classList.remove("active");

index=(index+1)%slides.length;

slides[index].classList.add("active");

},4000);
  
}

/* كتابة الرسالة */

function typeMessage(){

let text=`عيد ميلاد سعيد يا سموحتي ❤️

النهارده مش يوم عادي...
ده اليوم اللي اتولدت فيه أجمل إنسانة في حياتي.

من يوم ما دخلتي حياتي كل حاجة بقت أحلى.

بقيتي راحتي وسعادتي وأجمل حاجة حصلتلي.

بتمنى السنة دي تكون مليانة نجاح وفرح وتحقيق لكل أحلامك.

كل سنة وانتي أقرب حد لقلبي ❤️

— تفاتيفا`;

let i=0;

let speed=60;

function typing(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i);

i++;

setTimeout(typing,speed);

}

}

typing();

}

</script>

</body>
</html>
