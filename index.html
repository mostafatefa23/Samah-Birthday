<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>عيد ميلاد سعيد يا سموحتي ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
background: radial-gradient(circle,#1a001f,#000000);
color:white;
font-family:Tajawal, sans-serif;
text-align:center;
padding:20px;
overflow-x:hidden;
}

/* نجوم */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:radial-gradient(white 1px,transparent 1px);
background-size:40px 40px;
opacity:.2;
pointer-events:none;
}

/* أزرار */

button{
padding:15px 30px;
border:none;
border-radius:12px;
background:#ff4fd8;
color:white;
font-size:18px;
cursor:pointer;
}

/* صندوق الباسورد */

.box{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:15px;
width:320px;
margin:auto;
margin-top:120px;
}

input{
padding:10px;
border-radius:10px;
border:none;
width:200px;
}

.hidden{
display:none;
}

/* القلوب */

.heart{
position:fixed;
color:#ff4fd8;
font-size:20px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* البالونات */

.balloon{
position:fixed;
bottom:-100px;
width:40px;
height:55px;
border-radius:50%;
opacity:.9;
animation:rise 10s linear infinite;
}

@keyframes rise{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* السلايدر */

.gallery{
display:flex;
justify-content:center;
align-items:center;
margin-top:40px;
}

.main-image img{
width:340px;
max-width:90%;
border-radius:20px;
box-shadow:0 0 30px rgba(255,0,150,0.6);
transition:1s;
}

/* الحب */

.love{
margin-top:40px;
font-size:45px;
color:#ff4fd8;
animation:zoom 1.5s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.15);}
}

/* الكيكة */

.cake{
font-size:90px;
margin-top:30px;
animation:bounce 2s infinite;
}

.candles{
font-size:30px;
margin-top:-20px;
animation:flicker 1s infinite alternate;
}

@keyframes flicker{
from{opacity:1;}
to{opacity:0.6;}
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

/* الرسالة */

.message{
max-width:600px;
margin:auto;
line-height:2;
font-size:18px;
margin-top:30px;
}

/* العداد */

.counter{
margin-top:30px;
font-size:22px;
color:#ff4fd8;
}

</style>
</head>

<body>

<div id="start">
<h1>🎁 عندي مفاجأة ليكي 🎁</h1>
<button onclick="startSite()">ابدئي</button>
</div>

<div class="box hidden" id="login">
<p>اكتبي التاريخ المميز بيننا ❤️</p>
<input type="text" id="pass" placeholder="مثال: 4/1/2025">
<br><br>
<button onclick="check()">فتح</button>
</div>

<div id="content" class="hidden">

<h1>🎉 عيد ميلاد سعيد يا سموحتي 🎉</h1>

<audio id="music">
<source src="song.mp3" type="audio/mpeg">
</audio>

<h2>اجمل ذكرياتنا مع بعض 📸</h2>

<div class="gallery">
<div class="main-image">
<img id="mainPhoto" src="1.jpg">
</div>
</div>

<div id="loveMessage" class="love hidden">
💖 سماح ❤️ مصطفى 💖
</div>

<div id="cakeBox" class="cake hidden">
🎂
<div class="candles">🕯🕯🕯</div>
</div>

<div class="counter" id="counter"></div>

<div class="message" id="message"></div>

</div>

<script>

let images=[
"1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg",
"7.jpg","8.jpg","9.jpg","10.jpg","11.jpg","12.jpg"
];

let current=0;

function startSite(){
document.getElementById("start").style.display="none";
document.getElementById("login").classList.remove("hidden");
}

function check(){

if(document.getElementById("pass").value=="4/1/2025"){

document.getElementById("login").style.display="none";
document.getElementById("content").classList.remove("hidden");

document.getElementById("music").play();

startHearts();
startBalloons();
fireWorks();
typeMessage();
startCounter();

}

else{
alert("التاريخ غلط عيب عليكي ❤️");
}

}

/* السلايدر */

function autoSlide(){

current++;

if(current>=images.length){

document.getElementById("loveMessage").classList.remove("hidden");
document.getElementById("cakeBox").classList.remove("hidden");

confetti({
particleCount:500,
spread:200
});

setTimeout(()=>{
current=0;
},6000);

}

document.getElementById("mainPhoto").src=images[current];

}

setInterval(autoSlide,3500);

/* الألعاب النارية */

function fireWorks(){

setInterval(()=>{
confetti({
particleCount:120,
spread:100,
origin:{y:0.6}
});
},2000);

}

/* القلوب */

function startHearts(){

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"%";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),8000);

},600);

}

/* البالونات */

function startBalloons(){

setInterval(()=>{

let b=document.createElement("div");
b.className="balloon";

b.style.left=Math.random()*100+"%";
b.style.background="hsl("+Math.random()*360+",70%,60%)";

document.body.appendChild(b);

setTimeout(()=>b.remove(),10000);

},300);

}

/* الرسالة */

function typeMessage(){

let text=`عيد ميلاد سعيد يا سموحتي ❤️

النهارده مش يوم عادي...
ده اليوم اللي اتولدت فيه أجمل إنسانة في حياتي.

من يوم ما دخلتي حياتي كل حاجة بقت أحلى.

بقيتي راحتي وسعادتي وأجمل حاجة حصلتلي.

كل سنة وانتي أقرب حد لقلبي ❤️

— تفاتيفا`;

let i=0;

function typing(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,60);

}

}

typing();

}

/* العداد */

function startCounter(){

let startDate=new Date("2025-01-04");

setInterval(()=>{

let now=new Date();
let diff=now-startDate;

let days=Math.floor(diff/(1000*60*60*24));

document.getElementById("counter").innerHTML=
"بقالنا مع بعض "+days+" يوم ❤️";

},1000);

}

</script>

</body>
</html>
```
