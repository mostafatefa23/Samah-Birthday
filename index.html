```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>عيد ميلاد سعيد يا سموحتي ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
background: linear-gradient(135deg,#000000,#1a001f);
color:white;
font-family:Tajawal, sans-serif;
text-align:center;
padding:20px;
overflow-x:hidden;
}

button{
padding:15px 30px;
border:none;
border-radius:12px;
background:#ff4fd8;
color:white;
font-size:18px;
cursor:pointer;
}

.box{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:15px;
width:320px;
margin:auto;
margin-top:120px;
}

input{
padding:10px;
border-radius:10px;
border:none;
width:200px;
}

.hidden{
display:none;
}

/* القلوب */

.heart{
position:fixed;
color:#ff4fd8;
font-size:20px;
animation:float 8s linear infinite;
pointer-events:none;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* البالونات */

.balloon{
position:fixed;
bottom:-100px;
width:40px;
height:55px;
border-radius:50%;
opacity:.9;
animation:rise 10s linear infinite;
pointer-events:none;
}

@keyframes rise{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* الجاليري */

.gallery{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:40px;
flex-wrap:wrap;
}

.main-image img{
width:340px;
border-radius:20px;
box-shadow:0 0 30px rgba(255,0,150,0.6);
transition:1s;
}

.thumbs{
display:flex;
flex-direction:column;
gap:10px;
}

.thumbs img{
width:70px;
border-radius:10px;
cursor:pointer;
opacity:0.6;
transition:0.3s;
}

.thumbs img:hover{
opacity:1;
transform:scale(1.1);
}

/* الرسالة */

.message{
max-width:600px;
margin:auto;
line-height:2;
font-size:18px;
margin-top:30px;
}

/* الكيكة */

.cake{
font-size:80px;
margin-top:40px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

</style>
</head>

<body>

<div id="start">

<h1>🎁 عندي مفاجأة ليكي 🎁</h1>

<button onclick="startSite()">ابدئي</button>

</div>

<div class="box hidden" id="login">

<p>اكتبي التاريخ المميز بيننا ❤️</p>

<input type="text" id="pass" placeholder="مثال: 4/1/2025">

<br><br>

<button onclick="check()">فتح</button>

</div>

<div id="content" class="hidden">

<h1>🎉 عيد ميلاد سعيد يا سموحتي 🎉</h1>

<audio id="music">
<source src="song.mp3" type="audio/mpeg">
</audio>

<h2>اجمل ذكرياتنا مع بعض 📸</h2>

<div class="gallery">

<div class="main-image">
<img id="mainPhoto" src="1.jpg">
</div>

<div class="thumbs">

<img src="1.jpg" onclick="changePhoto(this)">
<img src="2.jpg" onclick="changePhoto(this)">
<img src="3.jpg" onclick="changePhoto(this)">
<img src="4.jpg" onclick="changePhoto(this)">
<img src="5.jpg" onclick="changePhoto(this)">

</div>

</div>

<div class="message" id="message"></div>

<div class="cake">🎂</div>

</div>

<script>

let images=["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg"];
let current=0;

function startSite(){

document.getElementById("start").style.display="none";
document.getElementById("login").classList.remove("hidden");

}

function check(){

var password="4/1/2025";
var input=document.getElementById("pass").value;

if(input==password){

document.getElementById("login").style.display="none";
document.getElementById("content").classList.remove("hidden");

document.getElementById("music").play();

startConfetti();
startHearts();
startBalloons();
fireWorks();
typeMessage();

}

else{

alert("التاريخ غلط ❤️");

}

}

function changePhoto(img){

document.getElementById("mainPhoto").src=img.src;

current=images.indexOf(img.src.split("/").pop());

}

function autoSlide(){

current++;

if(current>=images.length){
current=0;
}

document.getElementById("mainPhoto").src=images[current];

}

setInterval(autoSlide,4000);

function startConfetti(){

confetti({
particleCount:200,
spread:120
});

}

function fireWorks(){

setInterval(()=>{

confetti({
particleCount:120,
spread:100,
origin:{y:0.6}
});

},2000);

}

function startHearts(){

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

heart.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),8000);

},600);

}

function startBalloons(){

setInterval(()=>{

let b=document.createElement("div");

b.className="balloon";

b.style.left=Math.random()*100+"%";

b.style.background="hsl("+Math.random()*360+",70%,60%)";

document.body.appendChild(b);

setTimeout(()=>b.remove(),10000);

},300);

}

function typeMessage(){

let text=`عيد ميلاد سعيد يا سموحتي ❤️

النهارده مش يوم عادي...
ده اليوم اللي اتولدت فيه أجمل إنسانة في حياتي.

من يوم ما دخلتي حياتي كل حاجة بقت أحلى.

بقيتي راحتي وسعادتي وأجمل حاجة حصلتلي.

بتمنى السنة دي تكون مليانة نجاح وفرح وتحقيق لكل أحلامك.

كل سنة وانتي أقرب حد لقلبي ❤️

— تفاتيفا`;

let i=0;

function typing(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i);

i++;

setTimeout(typing,60);

}

}

typing();

}

</script>

</body>
</html>
```
